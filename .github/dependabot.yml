version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    versioning-strategy: increase-if-necessary
    groups:
      lint:
        patterns:
          - '@eslint/eslintrc'
          - '@typescript-eslint/*'
          - eslint
          - eslint-config-prettier
          - eslint-plugin-prettier
          - prettier
