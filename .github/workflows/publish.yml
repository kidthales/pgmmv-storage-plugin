name: Publish

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  strip-comments-and-upload-to-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - run: npm ci
      - run: npx @prasadrajandran/strip-comments-cli --keep-protected ./plugin.js | ./node_modules/.bin/prettier --stdin-filepath plugin.js | grep '.' > pgmmv-storage-plugin-${{ github.event.release.tag_name }}.js
      - run: gh release upload ${{ github.event.release.tag_name }} pgmmv-storage-plugin-${{ github.event.release.tag_name }}.js --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs:
    runs-on: ubuntu-latest
    needs: strip-comments-and-upload-to-release
    steps:
      - run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DOCS_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/kidthales/kidthales.github.io/actions/workflows/cd.yml/dispatches \
            -d "{\"ref\": \"main\"}" \
            --fail-with-body
